<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Story - My Video</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { max-width: 800px; width: 100%; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .video-wrapper { margin-top: 20px; background: #000; border-radius: 10px; overflow: hidden; }
        video { width: 100%; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Story</h1>
        <p>အောက်က video လေးကို ကြည့်ရှုပေးပါခင်ဗျာ။</p>
        <div class="video-wrapper">
            <video controls>
                <source src="video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <div class="footer" style="margin-top:20px; color:#666;">
            &copy; 2026 The Story App - Developed by Nyi Nyi
        </div>
    </div>
</body>
</html>
